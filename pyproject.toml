[tool.pytest.ini_options]
# Run async test functions automatically without per-test @pytest.mark.asyncio.
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
# Repo root on sys.path so `from scripts.seed_enterprise_demo import ...` works.
pythonpath = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# Show short tracebacks + skip warnings noise from third-party deps.
# `-m 'not slow'` excludes heavy perf benchmarks from the default suite;
# run them explicitly with `pytest -m slow`.
addopts = "-ra --strict-markers --tb=short -m 'not slow'"
filterwarnings = [
    "ignore::DeprecationWarning:pydantic.*",
    "ignore::DeprecationWarning:pkg_resources.*",
    # datetime.utcnow() is deprecated on 3.13 but we use it intentionally for
    # naive-UTC timestamps that match the v1.0-flask schema. Replacing with
    # tz-aware datetimes is a separate workstream — see MIGRATION_TODO.
    "ignore:datetime.datetime.utcnow.. is deprecated:DeprecationWarning",
]
markers = [
    "slow: heavy perf/integration tests (Phase 2 §10.4 target). Run with -m slow.",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "C4", "RUF"]
ignore = [
    "E501",   # line length handled by formatter
    "B008",   # function-call-in-default — FastAPI's Depends/Field/File idiom
    "B904",   # raise-without-from-inside-except — common in narrow handlers
    "RUF001", # string unicode (Hebrew letters, math glyphs) — false-positive
              # on intentional non-ASCII content in prompts + seed scripts
    "RUF002", # docstring unicode (em-dash, en-dash) — we use them deliberately
    "RUF003", # comment unicode — same reason
    "RUF022", # __all__ ordering — we order by file structure, not alphabet
    "UP038",  # `isinstance(x, int | float)` requires py 3.10+ runtime types only
    "N806",   # variable in function lowercased — false-positives on dataclass-like names
]

[tool.ruff.lint.per-file-ignores]
# Tests use `assert` (B011), import-order patterns, and the occasional
# blind `pytest.raises(Exception)` for negative-path coverage. C408
# (`dict()` instead of `{}`) is fine for test-readability where keys
# are dynamic.
"tests/**" = ["B017", "F841", "E741", "B007", "RUF005", "C408"]
# Routers shadow stdlib names like `id` and `format` for FastAPI path params.
# F841 covers debug sentinels left in branchy code; the real lint pass
# is the test suite.
"src/api/**" = ["A001", "A002", "F841"]
# Cryptography helper keeps the v1 exception class name for backwards
# compat with existing callers.
"src/core/encryption.py" = ["N818"]
# Wizard service has a conditional whose `else` branch is deliberately
# explicit for readability even though one branch is unreachable today.
"src/services/org_wizard_service.py" = ["RUF034"]
