[tool.pytest.ini_options]
# Run async test functions automatically without per-test @pytest.mark.asyncio.
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# Show short tracebacks + skip warnings noise from third-party deps.
addopts = "-ra --strict-markers --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning:pydantic.*",
    "ignore::DeprecationWarning:pkg_resources.*",
    # datetime.utcnow() is deprecated on 3.13 but we use it intentionally for
    # naive-UTC timestamps that match the v1.0-flask schema. Replacing with
    # tz-aware datetimes is a separate workstream — see MIGRATION_TODO.
    "ignore:datetime.datetime.utcnow.. is deprecated:DeprecationWarning",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "C4", "RUF"]
ignore = [
    "E501",   # line length handled by formatter
    "B008",   # function-call-in-default — FastAPI's Depends/Field/File idiom
    "B904",   # raise-without-from-inside-except — common in narrow handlers
    "RUF002", # docstring unicode (em-dash, en-dash) — we use them deliberately
    "RUF003", # comment unicode — same reason
    "RUF022", # __all__ ordering — we order by file structure, not alphabet
    "UP038",  # `isinstance(x, int | float)` requires py 3.10+ runtime types only
    "N806",   # variable in function lowercased — false-positives on dataclass-like names
]

[tool.ruff.lint.per-file-ignores]
# Tests use `assert` (B011), import-order patterns, and the occasional
# blind `pytest.raises(Exception)` for negative-path coverage.
"tests/**" = ["B017", "F841", "E741", "B007", "RUF005"]
# Routers shadow stdlib names like `id` and `format` for FastAPI path params.
"src/api/**" = ["A001", "A002"]
