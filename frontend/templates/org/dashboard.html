<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e14">
    <meta name="robots" content="noindex, nofollow">
    <title>{{ organization.name }} - NextPlay Enterprise</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo_transparent.png') }}">
</head>
<body class="admin-body">

<div class="admin-layout">
    <nav class="admin-nav">
        <div class="admin-nav-inner">
            <a href="/org/dashboard" class="admin-brand">
                <img src="{{ url_for('static', filename='img/logo_transparent.png') }}" alt="NextPlay" class="admin-brand-logo">
                <h1>{{ organization.name }} <span class="brand-tag">{{ role }}</span></h1>
            </a>
            <div class="admin-nav-user">
                <span>{{ user_display_name or user_email }}</span>
                <a href="/org/logout">Sign out</a>
            </div>
        </div>
    </nav>

    <main class="admin-main" style="padding: 24px;">
        <h2>Dashboard</h2>
        <p>Phase 0 placeholder. Live stats are wired via <code>GET /org/api/dashboard/summary</code>.</p>

        <div id="org-stats" class="admin-stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-top: 24px;">
            <div class="stat-tile"><div class="stat-label">Members</div><div class="stat-value" data-stat="member_count">—</div></div>
            <div class="stat-tile"><div class="stat-label">Branches</div><div class="stat-value" data-stat="branch_count">—</div></div>
            <div class="stat-tile"><div class="stat-label">Regions</div><div class="stat-value" data-stat="region_count">—</div></div>
            <div class="stat-tile"><div class="stat-label">Teams</div><div class="stat-value" data-stat="team_count">—</div></div>
        </div>
    </main>
</div>

<script nonce="{{ g.csp_nonce }}">
(async function () {
    try {
        const r = await fetch("/org/api/dashboard/summary", {
            headers: { "X-Requested-With": "XMLHttpRequest", "Accept": "application/json" },
            credentials: "same-origin",
        });
        if (!r.ok) return;
        const data = await r.json();
        for (const key of ["member_count", "branch_count", "region_count", "team_count"]) {
            const el = document.querySelector(`[data-stat="${key}"]`);
            if (el && typeof data[key] === "number") el.textContent = data[key];
        }
    } catch (e) { /* silently ignore in Phase 0 */ }
})();
</script>

</body>
</html>
