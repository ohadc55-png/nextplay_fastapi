<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e14">
    <meta name="robots" content="noindex, nofollow">
    <title>Sign in - NextPlay Enterprise</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo_transparent.png') }}">
</head>
<body class="admin-body admin-login-page">

<div class="admin-login-card">
    <div class="login-brand">
        <img src="{{ url_for('static', filename='img/logo_transparent.png') }}" alt="NextPlay" width="56" height="56" style="border-radius: 12px;">
        <h1>NEXTPLAY <span class="brand-tag">Enterprise</span></h1>
        <p>Sign in to your organization</p>
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/org/login">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn">Sign In</button>
    </form>
</div>

</body>
</html>
