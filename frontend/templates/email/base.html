{# NEXTPLAY email base layout.
   Inline styles only — most email clients strip <style> blocks.
   Children MUST define:
     - {% block subject_tag %} — short subject line (no HTML)
     - {% block text_body %}  — plaintext fallback (no HTML, line-wrapped)
     - {% block body %}       — the rendered HTML body
   Optional context:
     - cta_url, cta_label_en, cta_label_he   → renders the orange CTA button
     - unsubscribe_url                        → renders the unsubscribe link
   templates.py reads SUBJECT / TEXT comments at the top, then strips them. #}
<!-- SUBJECT: {% block subject_tag %}{% endblock %} -->
<!-- TEXT: {% block text_body %}{% endblock %} -->
<!DOCTYPE html>
<html lang="{{ language }}" dir="{% if rtl %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ self.subject_tag() }}</title>
</head>
<body style="margin:0;padding:0;background:#0a0e14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#f0f3f6;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#0a0e14;padding:32px 16px;">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="max-width:600px;background:#151c2a;border:1px solid rgba(255,107,53,0.18);border-radius:14px;overflow:hidden;">

                    {# ── Header: emoji 🏀 + brand wordmark side-by-side, tagline below.
                       Decision (2026-05-05): no <img> tag — Gmail strips data
                       URIs entirely. When trynextplay.net is bought + DNS is
                       set up, swap the emoji for an <img src="<app_url>/static/img/logo_email.png">. #}
                    <tr>
                        <td style="padding:28px 32px 22px;border-bottom:1px solid rgba(255,255,255,0.06);">
                            <a href="{{ app_url }}" style="text-decoration:none;color:inherit;display:block;">
                                <div style="text-align:center;">
                                    <span style="display:inline-block;font-size:32px;line-height:1;vertical-align:middle;{% if rtl %}margin-left{% else %}margin-right{% endif %}:12px;">🏀</span>
                                    <span style="display:inline-block;font-size:28px;font-weight:800;letter-spacing:0.04em;color:#ff6b35;line-height:1;vertical-align:middle;">{{ brand_name }}</span>
                                </div>
                                <div style="margin-top:12px;text-align:center;font-size:12px;color:#9ba4b0;font-style:italic;letter-spacing:0.02em;">
                                    {% if rtl %}נבנה על ידי מאמן, למאמנים{% else %}Built by a coach, for coaches{% endif %}
                                </div>
                            </a>
                        </td>
                    </tr>

                    {# ── Body (defined by children) ── #}
                    <tr>
                        <td style="padding:32px;text-align:{% if rtl %}right{% else %}left{% endif %};font-size:15px;line-height:1.65;color:#c4c9d1;">
                            {% block body %}{% endblock %}
                        </td>
                    </tr>

                    {# ── CTA button (optional, set by child via context) ── #}
                    {% if cta_url %}
                    <tr>
                        <td style="padding:0 32px 36px;text-align:center;">
                            <a href="{{ cta_url }}"
                               style="display:inline-block;background:#ff6b35;color:#ffffff;text-decoration:none;font-weight:600;font-size:15px;padding:14px 32px;border-radius:10px;">
                                {% if rtl %}{{ cta_label_he or 'המשך' }}{% else %}{{ cta_label_en or 'Continue' }}{% endif %}
                            </a>
                        </td>
                    </tr>
                    {% endif %}

                    {# ── Footer: address + personal touch + legal + unsubscribe ── #}
                    <tr>
                        <td style="padding:24px 32px 20px;background:#0f1520;border-top:1px solid rgba(255,255,255,0.06);text-align:center;font-size:12px;color:#9ba4b0;line-height:1.7;">

                            {# Personal touch — mailto reply #}
                            <div style="margin:0 0 14px;color:#c4c9d1;font-size:13px;">
                                {% if rtl %}
                                    נבנה על ידי מאמן. <a href="mailto:ohadc55@gmail.com" style="color:#ff6b35;text-decoration:none;font-weight:600;">השיב למייל הזה</a> — אני קורא כל אחד אישית. <br>
                                    <span style="color:#9ba4b0;">— אוהד</span>
                                {% else %}
                                    Built by a coach. <a href="mailto:ohadc55@gmail.com" style="color:#ff6b35;text-decoration:none;font-weight:600;">Reply to this email</a> — I read every one personally. <br>
                                    <span style="color:#9ba4b0;">— Ohad</span>
                                {% endif %}
                            </div>

                            {# Legal links #}
                            <div style="margin:0 0 10px;font-size:12px;">
                                <a href="{{ app_url }}/privacy" style="color:#9ba4b0;text-decoration:none;">{% if rtl %}פרטיות{% else %}Privacy{% endif %}</a>
                                <span style="color:#5a6372;">&nbsp;·&nbsp;</span>
                                <a href="{{ app_url }}/terms" style="color:#9ba4b0;text-decoration:none;">{% if rtl %}תקנון{% else %}Terms{% endif %}</a>
                                <span style="color:#5a6372;">&nbsp;·&nbsp;</span>
                                <a href="{{ app_url }}" style="color:#9ba4b0;text-decoration:none;">trynextplay.net</a>
                            </div>

                            {# Address — required by CAN-SPAM (US) + GDPR (EU) #}
                            <div style="margin:0 0 8px;font-size:11px;color:#5a6372;">
                                {{ brand_name }} &middot; Gedera, Israel
                            </div>

                            {# Unsubscribe — only for marketing emails (when caller passes unsubscribe_url) #}
                            {% if unsubscribe_url %}
                            <div style="margin:8px 0 0;font-size:11px;color:#5a6372;">
                                {% if rtl %}
                                    לא מעוניין במיילים שיווקיים? <a href="{{ unsubscribe_url }}" style="color:#5a6372;text-decoration:underline;">בטל מנוי</a>
                                {% else %}
                                    Don't want marketing emails? <a href="{{ unsubscribe_url }}" style="color:#5a6372;text-decoration:underline;">Unsubscribe</a>
                                {% endif %}
                            </div>
                            {% endif %}

                            <div style="margin:8px 0 0;font-size:10px;color:#5a6372;">© 2026 {{ brand_name }}</div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
