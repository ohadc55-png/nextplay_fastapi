<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e14">
    <title>Set new password — NextPlay</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo_transparent.png') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-brand">
            <a href="/main"><img src="{{ url_for('static', filename='img/logo_transparent.png') }}" alt="NextPlay" width="80" height="80" style="display:inline-block;"></a>
            <h1>NEXTPLAY</h1>
            <p>Set a new password</p>
        </div>

        {% if not token_valid %}
        <div class="auth-error" style="display:block;">
            This reset link is invalid or has expired (links expire 1 hour after request).
        </div>
        <div style="text-align:center;margin-top:18px;">
            <a href="/forgot-password" class="btn-primary-auth" style="display:inline-block;text-decoration:none;padding:13px 32px;">Request a new link</a>
        </div>
        {% else %}
        <div id="authError" class="auth-error" style="display:none;"></div>
        <div id="authSuccess" class="auth-error" style="display:none;background:rgba(34,197,94,0.10);border-color:rgba(34,197,94,0.4);color:#86efac;"></div>

        <form id="resetForm" class="auth-form">
            <div class="form-group">
                <label for="new_password">New password</label>
                <div class="password-wrapper">
                    <input type="password" id="new_password" class="form-input" placeholder="Min. 8 chars, upper+lower+digit" required minlength="8" autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('new_password', this)">Show</button>
                </div>
            </div>
            <div class="form-group">
                <label for="new_password_confirm">Confirm new password</label>
                <input type="password" id="new_password_confirm" class="form-input" placeholder="Repeat password" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" id="submitBtn" class="btn-primary-auth">Set new password</button>
        </form>
        {% endif %}

        <div class="auth-footer">
            <a href="/login">Back to sign in</a>
        </div>
    </div>
</div>

<script src="/static/js/utils/auth-ui.js"></script>
<script nonce="{{ g.csp_nonce }}">
{% if token_valid %}
document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('authError');
    const successEl = document.getElementById('authSuccess');
    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    const pw = document.getElementById('new_password').value;
    const pw2 = document.getElementById('new_password_confirm').value;
    if (pw !== pw2) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
    }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
        const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token: {{ token|tojson }}, new_password: pw}),
        });
        const data = await res.json();
        if (res.ok) {
            successEl.textContent = '✓ Password updated. Redirecting to sign in…';
            successEl.style.display = 'block';
            btn.textContent = 'Done';
            setTimeout(() => { window.location.href = '/login'; }, 1500);
        } else {
            errorEl.textContent = data.error || 'Something went wrong. Please try again.';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Set new password';
        }
    } catch (e) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Set new password';
    }
});
{% endif %}
</script>

</body>
</html>
