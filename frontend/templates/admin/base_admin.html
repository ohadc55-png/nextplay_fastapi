<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e14">
    <meta name="robots" content="noindex, nofollow">
    <title>{% block title %}Admin{% endblock %} - NextPlay</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo_transparent.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" nonce="{{ g.csp_nonce }}"></script>
</head>
<body class="admin-body">

<div class="admin-layout">

    <!-- Top Navigation -->
    <nav class="admin-nav">
        <div class="admin-nav-inner">
            <a href="/" class="admin-brand">
                <img src="{{ url_for('static', filename='img/logo_transparent.png') }}" alt="NextPlay" class="admin-brand-logo">
                <h1>NextPlay <span class="brand-tag">Admin</span></h1>
            </a>

            <div class="admin-tabs">
                <a href="{{ url_for('admin.dashboard') }}" class="{% if active_tab == 'dashboard' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                    <span class="tab-label">Dashboard</span>
                </a>
                <a href="{{ url_for('admin.users') }}" class="{% if active_tab == 'users' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span class="tab-label">Users</span>
                </a>
                <a href="/admin/orgs" class="{% if active_tab == 'orgs' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h.01M9 12h.01M9 15h.01M9 18h.01M14 9h.01M14 12h.01M14 15h.01M14 18h.01"/></svg>
                    <span class="tab-label">Orgs</span>
                </a>
                <a href="{{ url_for('admin.api_costs') }}" class="{% if active_tab == 'api_costs' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    <span class="tab-label">API Costs</span>
                </a>
                <a href="{{ url_for('admin.feature_usage') }}" class="{% if active_tab == 'feature_usage' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    <span class="tab-label">Feature Usage</span>
                </a>
                <a href="{{ url_for('admin.research_sources') }}" class="{% if active_tab == 'research_sources' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span class="tab-label">Research Sources</span>
                </a>
                <a href="{{ url_for('admin.user_activity') }}" class="{% if active_tab == 'user_activity' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span class="tab-label">User Activity</span>
                </a>
                <a href="{{ url_for('admin.feedback') }}" class="{% if active_tab == 'feedback' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span class="tab-label">Feedback</span>
                </a>
                <a href="{{ url_for('admin.geography') }}" class="{% if active_tab == 'geography' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span class="tab-label">Geography</span>
                </a>
                <a href="{{ url_for('admin.sales_inquiries') }}" class="{% if active_tab == 'sales' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <span class="tab-label">Inquiries</span>
                </a>
                <a href="{{ url_for('admin.email_log_view') }}" class="{% if active_tab == 'emails' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span class="tab-label">Emails</span>
                </a>
            </div>

            <div class="admin-nav-actions">
                <a href="{{ url_for('admin.logout') }}" class="admin-logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span class="tab-label">Logout</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="admin-content">
        {% block content %}{% endblock %}
    </main>

</div>

{% block scripts %}{% endblock %}

</body>
</html>
